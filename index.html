<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room: Sombras Románticas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root {
            --vintage-paper: #fdfaf1;
            --gothic-red: #5a0000;
        }

        body {
            background-color: #080404;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        .font-serif-vintage { font-family: 'EB+Garamond', serif; }
        .font-gothic { font-family: 'Cinzel', serif; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fdfaf1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6e0000; border-radius: 10px; }

        .blur-text {
            filter: blur(12px);
            opacity: 0.2;
            user-select: none;
            transition: all 0.7s ease;
        }

        .unblur-text {
            filter: blur(0);
            opacity: 1;
        }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Fondo decorativo -->
    <div class="fixed inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]"></div>

    <main id="game-container" class="relative z-10 w-full max-w-5xl bg-[#fdfaf1] border-[16px] border-double border-[#5a0000] p-6 md:p-12 shadow-[0_0_100px_rgba(0,0,0,0.8)] rounded-sm min-h-[80vh] flex flex-col justify-center transition-all duration-500">
        <!-- El contenido se genera dinámicamente con JS -->
    </main>

    <script>
        // --- DATOS DEL JUEGO ---
        const STAGES = [
            'intro', 'neoclasicismo', 'contexto', 'espronceda_pirata', 
            'espronceda_reo', 'becquer_rimas', 'becquer_leyendas', 
            'rosalia', 'rivas', 'zorrilla', 'larra', 'finale'
        ];

        const CONTENT = {
            neoclasicismo: {
                title: "Prólogo: La Razón Ilustrada",
                author: "Leandro Fdez. de Moratín",
                text: "DON DIEGO: Ve aquí los frutos de la educación. Esto es lo que se llama criar bien a una niña: enseñarla a que mienta y oculte las pasiones más inocentes... Todo se permite, menos la sinceridad.",
                explanation: "El Neoclasicismo buscaba la utilidad social. Moratín critica aquí la educación represiva que obliga a las jóvenes a la insinceridad.",
                questions: [{
                    instruction: "¿Qué valor fundamental se pierde según el texto?",
                    options: ["La obediencia", "La sinceridad", "La elegancia"],
                    answer: "la sinceridad"
                }]
            },
            contexto: {
                title: "I. El Origen: Sturm und Drang",
                explanation: "El Romanticismo surgió como rechazo a la razón ilustrada, favoreciendo el 'genio' y la libertad individual.",
                questions: [{
                    instruction: "¿Qué movimiento prioriza el SENTIMIENTO frente a la RAZÓN?",
                    options: ["Ilustración", "Romanticismo", "Renacimiento"],
                    answer: "romanticismo"
                }]
            },
            espronceda_pirata: {
                title: "II. La Canción del Pirata",
                author: "José de Espronceda",
                text: "Que es mi barco mi tesoro, / que es mi dios la libertad, / mi ley, la fuerza y el viento, / mi única patria, la mar.",
                explanation: "El pirata es el héroe romántico: un ser marginal que vive fuera de las leyes sociales.",
                questions: [{
                    instruction: "Completa: 'Que es mi barco mi _________'",
                    type: "input",
                    answer: "tesoro",
                    hint: "Lee la primera línea del estribillo."
                }]
            },
            becquer_rimas: {
                title: "IV. Las Rimas de Bécquer",
                author: "G.A. Bécquer",
                text: "Volverán las oscuras golondrinas... / Pero aquellas que aprendieron nuestros nombres... / ¡esas no volverán! / ... / Volverán las tupidas madreselvas... / pero aquellas cuajadas de rocío... / ¡esas no volverán! / ... / Como yo te he querido... desengáñate: / ¡así no te querrán!",
                explanation: "Bécquer contrasta los ciclos de la naturaleza (que regresan) con el amor humano (que es único e irrecuperable).",
                questions: [
                    {
                        instruction: "Ordena los elementos según aparecen en la Rima LIII (ej: 0,1,2):",
                        type: "order",
                        items: ["Golondrinas", "Madreselvas", "Amor mudo y de rodillas"],
                        answer: "0,1,2",
                        hint: "Orden: Aves, Plantas y finalmente el Sentimiento del poeta."
                    }
                ]
            },
            // Se pueden añadir más siguiendo este patrón...
            finale: {
                title: "¡LIBERTAD!",
                text: "Has superado las sombras del siglo XIX."
            }
        };

        // --- ESTADO DEL JUEGO ---
        let currentState = {
            stage: 'intro',
            subStage: 0,
            showText: false,
            hintVisible: false,
            isExplaining: false,
            feedback: ''
        };

        // --- LÓGICA ---
        function normalize(str) {
            if (!str) return "";
            return str.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
        }

        function handleAction(val) {
            const stageData = CONTENT[currentState.stage];
            const q = stageData.questions[currentState.subStage];
            
            let correct = false;
            if (q.type === 'order') {
                correct = val.replace(/\s+/g, '') === q.answer;
            } else {
                correct = normalize(val) === normalize(q.answer);
            }

            if (correct) {
                currentState.feedback = "¡Brillante!";
                if (currentState.subStage < stageData.questions.length - 1) {
                    currentState.subStage++;
                    render();
                } else {
                    currentState.isExplaining = true;
                    render();
                }
            } else {
                currentState.feedback = "Esa llave no encaja...";
                render();
            }
        }

        function nextStage() {
            const idx = STAGES.indexOf(currentState.stage);
            currentState.stage = STAGES[idx + 1] || 'finale';
            currentState.subStage = 0;
            currentState.isExplaining = false;
            currentState.showText = false;
            currentState.feedback = '';
            currentState.hintVisible = false;
            render();
        }

        // --- RENDERIZADO ---
        function render() {
            const container = document.getElementById('game-container');
            const data = CONTENT[currentState.stage];

            if (currentState.stage === 'intro') {
                container.innerHTML = `
                    <div class="text-center space-y-8 animate-fade-in">
                        <i data-lucide="skull" class="w-32 h-32 mx-auto text-red-950 opacity-80"></i>
                        <h1 class="text-6xl font-gothic font-bold text-red-950">SOMBRAS ROMÁNTICAS</h1>
                        <p class="text-xl font-serif-vintage italic border-x-4 border-red-900 px-6 py-2">Escapa del siglo XIX demostrando tu conocimiento literario.</p>
                        <button onclick="nextStage()" class="px-12 py-4 bg-red-950 text-white font-gothic text-2xl hover:bg-black transition-all shadow-xl">ABRIR LIBRO</button>
                    </div>
                `;
            } else if (currentState.isExplaining) {
                container.innerHTML = `
                    <div class="space-y-6 animate-fade-in">
                        <div class="bg-amber-50 p-8 border-4 border-red-900 shadow-xl">
                            <h3 class="text-2xl font-gothic text-red-950 mb-4 underline">Sabiduría Literaria</h3>
                            <p class="text-lg font-serif-vintage italic">${data.explanation}</p>
                        </div>
                        <button onclick="nextStage()" class="w-full py-4 bg-red-950 text-white font-gothic text-xl flex items-center justify-center gap-2">
                            SIGUIENTE CAPÍTULO <i data-lucide="unlock"></i>
                        </button>
                    </div>
                `;
            } else if (currentState.stage === 'finale' || !data) {
                container.innerHTML = `
                    <div class="text-center space-y-6 animate-fade-in">
                        <i data-lucide="landmark" class="w-32 h-32 mx-auto text-amber-700"></i>
                        <h2 class="text-6xl font-gothic text-red-950 font-bold">¡LIBERTAD!</h2>
                        <button onclick="location.reload()" class="px-8 py-3 bg-black text-white font-bold uppercase tracking-widest">Reiniciar</button>
                    </div>
                `;
            } else {
                const q = data.questions[currentState.subStage];
                let inputHtml = '';

                if (q.type === 'order') {
                    inputHtml = `
                        <div class="space-y-2 mb-4">
                            ${q.items.map((item, i) => `<div class="p-2 bg-gray-50 border font-serif-vintage"><b>[${i}]</b> ${item}</div>`).join('')}
                        </div>
                        <input id="ans-input" type="text" placeholder="Ej: 0,1,2" class="w-full p-3 border-2 border-red-900 text-center font-mono">
                    `;
                } else if (q.options) {
                    inputHtml = q.options.map(opt => `
                        <button onclick="handleAction('${opt}')" class="w-full p-4 mb-2 border-2 hover:bg-red-50 text-left font-serif-vintage transition-all">${opt}</button>
                    `).join('');
                } else {
                    inputHtml = `<input id="ans-input" type="text" placeholder="Escribe aquí..." class="w-full p-4 border-b-4 border-red-900 bg-transparent text-2xl outline-none font-serif-vintage">`;
                }

                container.innerHTML = `
                    <div class="space-y-6 animate-fade-in">
                        <div class="flex justify-between items-end border-b-2 border-red-900 pb-2">
                            <h2 class="text-3xl font-gothic text-red-950">${data.title}</h2>
                            <span class="text-xs font-bold uppercase">${currentState.stage}</span>
                        </div>

                        ${data.text ? `
                            <div class="relative group">
                                <div id="poem-text" class="p-6 bg-white border-l-8 border-red-900 shadow-md italic font-serif-vintage text-lg leading-relaxed ${currentState.showText ? '' : 'blur-text'}">
                                    ${data.text.split('/').join('<br>')}
                                </div>
                                ${!currentState.showText ? `
                                    <button onclick="currentState.showText=true; render()" class="absolute inset-0 m-auto h-fit w-fit px-6 py-3 bg-red-950 text-white font-gothic flex items-center gap-2 shadow-2xl">
                                        <i data-lucide="eye"></i> LEER PERGAMINO
                                    </button>
                                ` : ''}
                            </div>
                        ` : ''}

                        <div class="bg-white p-6 border-2 border-red-50 shadow-inner space-y-4">
                            <p class="text-xl font-serif-vintage font-bold"><i data-lucide="target" class="inline w-5 h-5 mr-2"></i>${q.instruction}</p>
                            ${inputHtml}
                            ${!q.options ? `<button onclick="handleAction(document.getElementById('ans-input').value)" class="w-full py-4 bg-red-900 text-white font-bold uppercase tracking-widest mt-4">Resolver</button>` : ''}
                            
                            <div class="text-center mt-4">
                                <p class="text-red-700 font-bold mb-2">${currentState.feedback}</p>
                                <button onclick="currentState.hintVisible=!currentState.hintVisible; render()" class="text-xs text-gray-400 uppercase tracking-tighter flex items-center gap-1 mx-auto">
                                    <i data-lucide="help-circle" class="w-3 h-3"></i> Pista
                                </button>
                                ${currentState.hintVisible ? `<p class="mt-2 text-sm italic text-amber-800 bg-amber-50 p-2 border border-amber-200">${q.hint || 'Busca la respuesta en el texto.'}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        // Iniciar
        window.onload = render;
    </script>
</body>
</html>
